# redis.conf — Redis configuration for RAG cache persistence
#
# ROOT CAUSE FIX: Redis by default uses RDB snapshots which are infrequent
# and lossy. Enabling AOF (Append-Only File) ensures every write is logged
# to disk so data survives container/server restarts within TTL.
#
# Mount this file into the Redis container via docker-compose volumes.

# ── Persistence ───────────────────────────────────────────────────────────────

# AOF: log every write to disk — data survives restarts
appendonly yes
appendfilename "appendonly.aof"

# fsync policy:
#   everysec = flush to OS every second (good balance of safety vs performance)
#   always   = flush on every write (safest, slower)
#   no       = let OS decide (fastest, least safe)
appendfsync everysec

# Also keep RDB snapshots as a secondary safety net
# Format: save <seconds> <changes>
save 900 1       # save if ≥1 key changed in 900s
save 300 10      # save if ≥10 keys changed in 300s
save 60  100     # save if ≥100 keys changed in 60s

# RDB file
dbfilename dump.rdb

# Data directory — must match the volume mount in docker-compose.yml
dir /data

# ── Memory & eviction ─────────────────────────────────────────────────────────

# Set a memory cap — tune to your available RAM
maxmemory 512mb

# When maxmemory is reached, evict keys with the soonest TTL expiry
# (allkeys-lru is also fine if you want to keep the most-used answers)
maxmemory-policy volatile-ttl

# ── Performance ───────────────────────────────────────────────────────────────

# Rewrite AOF file when it grows 100% larger than last rewrite
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 64mb

# Don't fsync during AOF rewrite to avoid blocking the main thread
no-appendfsync-on-rewrite yes

# ── Networking ────────────────────────────────────────────────────────────────

# Bind to all interfaces inside Docker network
bind 0.0.0.0
protected-mode no

# Keep idle connections alive
tcp-keepalive 60